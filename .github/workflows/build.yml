name: 'Build'

on:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '**LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '2'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          check-latest: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: chmod +x gradlew && ./gradlew build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 'upload'
          path: './build/libs/'
